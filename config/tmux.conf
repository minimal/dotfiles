# Sane scrolling
# Mouse support (scroll, click panes, resize)
set -g mouse on

# Allow passthrough of escape sequences (cursor shapes, etc.)
set -g allow-passthrough on
set -g terminal-overrides '*:smcup@:rmcup@'
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
# n.b. to get scroll back on iterm2 : prefs -> profiles -> terminal: tick Save
# Lines to scrollback when app status bar is present

# use 256 colors and  make ls++ display correctly 
set -g default-terminal "tmux-256color"

# Automatically set window title
setw -g automatic-rename

# Modern status bar — purples, greens, blues
set -g status-bg black
set -g status-fg white

# Left: hostname (green bold) + session name (magenta/purple), wrapped in brackets
set -g status-left-length 40
set -g status-left '#[fg=green]#H #[fg=magenta]#S #[default]'

# Right: uptime info (blue)
set -g status-right '#[fg=cyan]#(uptime | cut -d "," -f 4- | cut -d ":" -f 2-)#[default]'

# Window list — active window highlighted
setw -g window-status-current-style fg=black,bg=cyan,bold
setw -g window-status-style fg=brightblack,bg=black
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '

# Notifications
setw -g monitor-activity on
set -g visual-activity on
setw -g window-status-activity-style fg=black,bg=green

# essential
bind r source-file ~/.tmux.conf

# shift arrows to move
bind-key -n S-Left previous-window
bind-key -n S-Right next-window 

# # change the prefix
set -g prefix C-h
unbind C-b
bind C-h send-prefix

# paste buffer
# prefix [ is copy mode
bind-key y paste-buffer

# Vim-style keybindings
set -g mode-keys vi

# Navigate panes with h/j/k/l (like vim splits)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Toggle last two panes with prefix + Tab
bind Tab select-pane -l

# Resize panes with H/J/K/L (hold shift)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode vi bindings
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind -T copy-mode-vi 'y' send -X copy-selection-and-cancel

set -g history-limit 10000


# Window title
set-option -g set-titles on
set-option -g set-titles-string '[#S:#I #H] #W'

# List of plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'omerxx/tmux-sessionx'
unbind o
set -g @sessionx-bind 'o'
set -g @sessionx-custom-paths '~/code,/mnt/c/Users/Chris/github'
set -g @sessionx-custom-paths-subdirectories 'true'
set -g @sessionx-x-path '~/code'

# Initialize tpack (keep this line at the very bottom of tmux.conf)
run 'tpack init'
