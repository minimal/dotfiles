# Sane scrolling
# Mouse support (scroll, click panes, resize)
set -g mouse on

# Allow passthrough of escape sequences (cursor shapes, etc.)
set -g allow-passthrough on
set -g terminal-overrides '*:smcup@:rmcup@'
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
# n.b. to get scroll back on iterm2 : prefs -> profiles -> terminal: tick Save
# Lines to scrollback when app status bar is present

# use 256 colors and  make ls++ display correctly 
set -g default-terminal "tmux-256color"

set -g detach-on-destroy off     # don't exit from tmux when closing a session
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
# # Automatically set window title
# setw -g automatic-rename on

# Modern status bar — purples, greens, blues
# set -g status-bg black
# set -g status-fg white

# Left: hostname (green bold) + session name (magenta/purple), wrapped in brackets
# set -g status-left-length 40
# set -g status-left '#[fg=green]#H #[fg=magenta]#S #[default]'

# # Right: uptime info (blue)
# set -g status-right '#[fg=cyan]#(uptime | cut -d "," -f 4- | cut -d ":" -f 2-)#[default]'

# Window list — active window highlighted
# setw -g window-status-current-style fg=black,bg=cyan,bold
# setw -g window-status-style fg=brightblack,bg=black
# setw -g window-status-format ' #I:#W '
# setw -g window-status-current-format ' #I:#W '

# Notifications: activity indicator in tab title, no center message
setw -g monitor-activity on
set -g monitor-bell off
set -g visual-activity off
set -g visual-bell off
set-option -g bell-action other
# setw -g window-status-activity-style fg=black,bg=green

# essential
bind r source-file ~/.tmux.conf

# shift arrows to move
bind-key -n S-Left previous-window
bind-key -n S-Right next-window 

# # change the prefix
set -g prefix C-h
unbind C-b
bind C-h send-prefix

# paste buffer
# prefix [ is copy mode
bind-key y paste-buffer

bind  c  new-window      -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"


# Session switcher (Enter = switch, Ctrl-y = copy path)
bind-key -n S-Down display-popup -E "\
  tmux list-sessions -F '#{session_name}: #{pane_current_path}' \
  | fzf --no-preview --bind 'ctrl-y:execute-silent(echo {} | sed \"s/^[^:]*: //\" | pbcopy)+abort' \
  | sed 's/:.*//' \
  | xargs -I{} tmux switch-client -t {}"


bind-key -n F9 display-popup -E "\
  tmux list-sessions -F '#{session_name}: #{pane_current_path}' \
  | fzf --no-preview --bind 'ctrl-y:execute-silent(echo {} | sed \"s/^[^:]*: //\" | pbcopy)+abort' \
  | sed 's/:.*//' \
  | xargs -I{} tmux switch-client -t {}"

# sesh (better)
bind-key -n F8 run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

bind-key "W" run-shell "sesh window \"$(sesh window | fzf-tmux -p 60%,50% --prompt '🪟  ')\""

# bind-key C-p display-popup -E "zf()"
# bind-key C-p display-popup -w 80% -h 80% -E "zsh -i -c 'zf'"
bind-key C-p display-popup -w 80% -h 80% -E "zf"
bind-key -n F10 display-popup -w 80% -h 80% -E "zf"
# Fuzzy find and switch projects in a popup
# bind-key C-p display-popup -w 80% -h 80% -E "find ~/code -mindepth 1 -maxdepth 2 -type d -exec test -e '{}/.git' ';' -print -prune | fzf --no-preview --reverse | xargs -I {} tmux new-session -A -s '{}' -c '{}'"

# Vim-style keybindings
set -g mode-keys vi

# Navigate panes with h/j/k/l (like vim splits)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Toggle last two panes with prefix + Tab
bind Tab select-pane -l

# Resize panes with H/J/K/L (hold shift)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode vi bindings
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind -T copy-mode-vi 'y' send -X copy-selection-and-cancel

set -g history-limit 10000

# Window title
set-option -g set-titles on
# set-option -g set-titles-string '[#S:#I #H] #W'
# 
# set -g pane-active-border-style 'fg=magenta,bg=default'
# set -g pane-border-style 'fg=brightblack,bg=default'
# List of plugins
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin "joshmedeski/tmux-nerd-font-window-name"
set -g @plugin "tmux-plugins/tmux-resurrect"
# set -g @catppuccin_flavor 'mocha'
